name: Lint

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  lint:
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install tools
        run: brew install just swiftlint swiftformat

      - name: Lint
        run: just lint-check

      - name: Format check
        run: just format-check
